version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network

  gateway:
    build: ./gateway
    container_name: gateway
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  app_network:
    driver: bridge